# Name of your workflow
name: Deploy Static Site to GitHub Pages

# Run this workflow on every push to the main branch
on:
  push:
    branches: [ "main" ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "deploy"
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      # 1. Checks out your repository's code so the job can access it
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Prepares the repository for deployment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 3. Builds a clean publish directory containing only site files
      - name: Prepare publish dir
        run: |
          rm -rf site
          mkdir -p site
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude 'node_modules/' \
            --exclude 'site/' \
            --exclude '.DS_Store' \
            --exclude '*.log' \
            ./ site/

      # 4. Uploads only the publish directory as the Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      # 5. Deploys the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
