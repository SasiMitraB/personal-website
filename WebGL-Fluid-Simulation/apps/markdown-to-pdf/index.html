<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to PDF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css">
    <link rel="stylesheet" href="https://unpkg.com/highlight.js@11.8.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="../../style/design-system.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            background: var(--bg-base);
            font-family: var(--font-system);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--panel-border);
            flex-shrink: 0;
            gap: 2rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 999px;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            cursor: pointer;
            font-family: var(--font-system);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .back-button:hover {
            color: var(--accent);
            background: rgba(217, 119, 87, 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            color: var(--text-main);
            font-weight: 600;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-left: auto;
        }

        .export-btn {
            padding: 0.6rem 1.5rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 0;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: var(--font-system);
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(217, 119, 87, 0.3);
        }

        /* Main content */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1px;
            background: var(--panel-border);
            overflow: hidden;
        }

        /* Panes */
        .pane {
            display: flex;
            flex-direction: column;
            background: var(--bg-base);
            min-height: 0;
        }

        .pane-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--panel-border);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }

        .pane-content {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* Editor */
        #editor {
            width: 100%;
            height: 100%;
            padding: 1.5rem;
            border: none;
            outline: none;
            background: transparent;
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            resize: none;
            overflow-y: scroll;
            scrollbar-gutter: stable;
            box-sizing: border-box;
        }

        #editor::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* Preview */
        #preview {
            flex: 1;
            padding: 2rem;
            overflow-y: scroll;
            scrollbar-gutter: stable;
            color: var(--text-main);
            line-height: 1.8;
            font-size: 1rem;
        }

        /* Markdown styling in preview */
        #preview h1,
        #preview h2,
        #preview h3,
        #preview h4,
        #preview h5,
        #preview h6 {
            color: var(--text-main);
            font-weight: 700;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 0.5em;
        }

        #preview h1 { font-size: 2.2em; }
        #preview h2 { font-size: 1.8em; }
        #preview h3 { font-size: 1.5em; }
        #preview h4 { font-size: 1.25em; }
        #preview h5 { font-size: 1.1em; }
        #preview h6 { font-size: 1em; }

        #preview p {
            margin: 1em 0;
            color: var(--text-main);
        }

        #preview a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.2s ease;
        }

        #preview a:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        #preview code {
            background: var(--panel-bg);
            color: var(--accent);
            padding: 0.2em 0.5em;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
        }

        #preview pre {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 0;
            padding: 1.5em;
            overflow-x: auto;
            margin: 1em 0;
            line-height: 1.5;
        }

        #preview pre code {
            background: none;
            color: var(--accent);
            padding: 0;
            font-size: 0.85em;
        }

        #preview blockquote {
            border-left: 4px solid var(--accent);
            margin: 1em 0;
            padding-left: 1.5em;
            color: var(--text-muted);
            font-style: italic;
        }

        #preview ul,
        #preview ol {
            margin: 1em 0;
            padding-left: 2em;
        }

        #preview li {
            margin: 0.5em 0;
            color: var(--text-main);
        }

        #preview table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
            border: 1px solid var(--panel-border);
            border-radius: 0;
            overflow: hidden;
        }

        #preview th,
        #preview td {
            padding: 0.75em 1em;
            text-align: left;
            border: 1px solid var(--panel-border);
        }

        #preview th {
            background: var(--panel-bg);
            font-weight: 700;
            color: var(--accent);
        }

        #preview hr {
            border: none;
            border-top: 1px solid var(--panel-border);
            margin: 2em 0;
        }

        /* KaTeX */
        .katex-display {
            margin: 1em 0;
            overflow-x: auto;
        }

        /* Drag and drop overlay */
        .drop-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(26, 21, 18, 0.9);
            border: 3px dashed var(--accent);
            border-radius: 0;
            color: var(--accent);
            font-size: 1.25rem;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 100;
        }

        .editor-container.drag-over .drop-overlay {
            opacity: 1;
        }

        .editor-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            min-height: 0;
            display: flex;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 5px;
            opacity: 0.6;
        }

        ::-webkit-scrollbar-thumb:hover {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            main {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-wrap: wrap;
                padding: 1rem;
                gap: 1rem;
            }

            header h1 {
                order: 2;
                flex: 1;
                font-size: 1.25rem;
            }

            .header-left {
                order: 1;
            }

            .header-right {
                order: 3;
                margin-left: 0;
            }

            .pane-content {
                min-height: 300px;
            }
        }

        /* Print styles */
        @page {
            margin: 2cm;
        }

        @media print {
            body {
                background: white;
                color: #111827;
            }

            header {
                display: none !important;
            }

            main {
                display: block !important;
                grid-template-columns: none;
                gap: 0;
                background: white;
            }

            .pane {
                display: none !important;
            }

            .pane:last-child {
                display: flex !important;
                background: white;
            }

            .pane-header {
                display: none !important;
            }

            .pane-content {
                width: 100%;
            }

            #preview {
                display: block !important;
                background: white;
                color: #111827;
                padding: 2rem;
                overflow: visible;
                height: auto;
                width: 100%;
            }

            #preview * {
                background: white !important;
                color: #111827 !important;
                border-color: #d1d5db !important;
            }

            #preview a {
                color: #0000ee;
            }

            #preview pre {
                background: #f3f4f6 !important;
                border-color: #d1d5db !important;
            }

            #preview pre code {
                color: inherit !important;
            }

            /* Ensure KaTeX renders properly in print */
            #preview .katex-display {
                overflow-x: visible !important;
            }

            #preview .katex {
                font-size: 1.2em;
            }

            #preview pre {
                page-break-inside: avoid;
            }

            #preview h1,
            #preview h2,
            #preview h3 {
                page-break-after: avoid;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="../../" class="back-button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
                Home
            </a>
            <h1>Markdown to PDF</h1>
        </div>
        <div class="header-right">
            <button id="export-btn" class="export-btn">📄 Export PDF</button>
        </div>
    </header>

    <main>
        <div class="pane">
            <div class="pane-header">Editor</div>
            <div class="pane-content">
                <div class="editor-container">
                    <textarea
                        id="editor"
                        spellcheck="false"
                        placeholder="Type markdown here..."
                    ># Markdown to PDF Converter

## 📥 How to Export as PDF

1. Click the **Export PDF** button above
2. Use the keyboard shortcut **Cmd+P** (Mac) or **Ctrl+P** (Windows/Linux)
3. In the print dialog, look for **"Headers and footers"** or **"Print headers and footers"**
4. **Uncheck** this option to remove the page title and URL
5. Select **"Save as PDF"** and choose your location

Your PDF will include all rendered LaTeX equations perfectly formatted!

- Drag a `.md` file onto the editor to load it instantly
- The preview updates as you type
- Use `$$..$$` for centered equations and `$...$` for inline

                    </textarea>
                    <div class="drop-overlay">
                        <div>📥 Drop .md file here</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pane">
            <div class="pane-header">Preview</div>
            <div class="pane-content">
                <div id="preview"></div>
            </div>
        </div>
    </main>

    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js"></script>
    <script src="https://unpkg.com/highlight.js@11.8.0/highlight.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('editor');
            const preview = document.getElementById('preview');
            const exportBtn = document.getElementById('export-btn');
            const editorContainer = document.querySelector('.editor-container');

            // Render markdown
            const render = () => {
                try {
                    // Configure marked to add language classes to code blocks
                    marked.setOptions({
                        breaks: true,
                        gfm: true,
                        mangle: false,
                        headerIds: false
                    });

                    const html = marked.parse(editor.value);
                    const sanitized = DOMPurify.sanitize(html);
                    preview.innerHTML = sanitized;

                    // Highlight code blocks
                    preview.querySelectorAll('pre code').forEach(block => {
                        if (typeof hljs !== 'undefined') {
                            hljs.highlightElement(block);
                        }
                    });

                    // Render LaTeX
                    if (typeof renderMathInElement !== 'undefined') {
                        renderMathInElement(preview, {
                            delimiters: [
                                { left: '$$', right: '$$', display: true },
                                { left: '$', right: '$', display: false }
                            ],
                            throwOnError: false,
                            strict: false
                        });
                    }
                } catch (error) {
                    console.error('Render error:', error);
                    preview.innerHTML = '<div style="color: #ef4444; padding: 1rem;">Error rendering content</div>';
                }
            };

            // Event listeners
            editor.addEventListener('input', render);

            // Export to PDF
            exportBtn.addEventListener('click', () => {
                window.print();
            });

            // Drag and drop
            editorContainer.addEventListener('dragover', (e) => {
                e.preventDefault();
                editorContainer.classList.add('drag-over');
            });

            editorContainer.addEventListener('dragleave', () => {
                editorContainer.classList.remove('drag-over');
            });

            editorContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                editorContainer.classList.remove('drag-over');

                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].name.endsWith('.md')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        editor.value = event.target.result;
                        render();
                    };
                    reader.readAsText(files[0]);
                }
            });

            // Initial render
            render();
        });
    </script>
</body>
